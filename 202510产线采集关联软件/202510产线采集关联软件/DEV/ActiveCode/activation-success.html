<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活成功界面 - 客户端原型</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .scene-tabs {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 2000;
        }
        .scene-tab {
            padding: 8px 16px;
            border: none;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .scene-tab.active {
            background: var(--success-color);
            color: white;
        }
        .scene { display: none; }
        .scene.active { display: flex; }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--success-color), #4caf50);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <!-- 场景切换 -->
    <div class="scene-tabs">
        <button class="scene-tab active" onclick="showScene('first')">首次激活成功</button>
        <button class="scene-tab" onclick="showScene('renewal')">续期成功</button>
    </div>

    <!-- 场景1：首次激活成功 -->
    <div class="dialog-overlay scene active" id="scene-first">
        <div class="dialog dialog-sm">
            <div class="dialog-header">
                <span class="dialog-title">激活成功</span>
            </div>
            <div class="dialog-body">
                <div class="center-content">
                    <div class="success-icon">✓</div>
                    <h2 style="color: var(--success-color);">激活成功！</h2>
                </div>
                
                <div class="info-card mt-lg">
                    <div class="info-row">
                        <span class="info-label">激活时间</span>
                        <span class="info-value">2025-12-02</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">到期时间</span>
                        <span class="info-value">2026-12-02</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">有效期</span>
                        <span class="info-value" style="color: var(--success-color); font-weight: 500;">365天</span>
                    </div>
                </div>
            </div>
            <div class="dialog-footer center">
                <button class="btn btn-success btn-lg btn-block">开始使用</button>
            </div>
        </div>
    </div>

    <!-- 场景2：续期成功 -->
    <div class="dialog-overlay scene" id="scene-renewal">
        <div class="dialog dialog-sm">
            <div class="dialog-header">
                <span class="dialog-title">续期成功</span>
            </div>
            <div class="dialog-body">
                <div class="center-content">
                    <div class="success-icon">✓</div>
                    <h2 style="color: var(--success-color);">续期成功！</h2>
                </div>
                
                <div class="info-card mt-lg">
                    <div class="info-row">
                        <span class="info-label">原到期时间</span>
                        <span class="info-value" style="text-decoration: line-through; color: var(--text-muted);">2026-12-02</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">新到期时间</span>
                        <span class="info-value" style="color: var(--success-color); font-weight: 500;">2027-12-02</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">延长天数</span>
                        <span class="info-value" style="color: var(--success-color); font-weight: 500;">+365天</span>
                    </div>
                </div>
            </div>
            <div class="dialog-footer center">
                <button class="btn btn-success btn-lg btn-block">确定</button>
            </div>
        </div>
    </div>

    <script>
        function showScene(name) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('scene-' + name).classList.add('active');
            event.target.classList.add('active');
        }
    </script>

    <!-- 交互说明 -->
    <div style="position: fixed; bottom: 20px; left: 20px; background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 300px; font-size: 13px;">
        <strong>📝 交互说明（PRD 7.1.2）</strong>
        <ul style="margin: 8px 0 0 16px; color: #666; line-height: 1.8;">
            <li>首次激活显示激活时间和有效期</li>
            <li>续期显示原到期/新到期时间对比</li>
            <li>点击按钮进入主界面</li>
        </ul>
        <p style="margin-top: 12px;">
            <a href="../index.html" style="color: var(--primary-color);">← 返回导航</a>
        </p>
    </div>
</body>
</html>
