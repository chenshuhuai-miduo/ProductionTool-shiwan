# 产线采集关联软件配置文件
# Production Line Collection Software Configuration

# ================================
# 应用基础配置
# ================================
app.name=产线采集关联软件
app.version=1.0.0
app.description=Production Line Collection Software

# ================================
# 数据库配置
# ================================
# MySQL 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/production_line_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=ProductionLineHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# MyBatis-Plus 配置
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false
mybatis-plus.configuration.call-setters-on-nulls=true
mybatis-plus.configuration.jdbc-type-for-null=null
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ================================
# 日志配置
# ================================
# 日志级别
logging.level.root=INFO
logging.level.com.company.productionline=DEBUG
logging.level.com.baomidou.mybatisplus=DEBUG
logging.level.org.springframework=INFO

# 日志文件配置
logging.file.name=logs/production-line.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ================================
# 设备通信配置
# ================================
# 串口通信配置
device.serial.port=COM1
device.serial.baud-rate=9600
device.serial.data-bits=8
device.serial.stop-bits=1
device.serial.parity=0
device.serial.timeout=5000

# 网络通信配置
device.network.host=192.168.1.100
device.network.port=8080
device.network.timeout=10000
device.network.retry-count=3

# 读码器配置
device.scanner.enabled=true
device.scanner.type=SERIAL
device.scanner.command.read=READ
device.scanner.command.reset=RESET

# 打印机配置
device.printer.enabled=true
device.printer.path=C:\\PrintModule\\PrintService.exe
device.printer.timeout=30000

# ================================
# 业务配置
# ================================
# 任务管理配置
business.task.auto-sync.enabled=true
business.task.auto-sync.interval=300000
business.task.max-retry-count=3

# 数据采集配置
business.collection.batch-size=1000
business.collection.timeout=60000
business.collection.auto-upload.enabled=true
business.collection.auto-upload.interval=600000

# 码生成配置
business.code.generation.enabled=true
business.code.generation.prefix=L
business.code.generation.length=12
business.code.generation.check-digit=true

# ================================
# 外部服务配置
# ================================
# 标识平台API配置
external.api.base-url=http://api.example.com
external.api.timeout=30000
external.api.retry-count=3
external.api.auth.enabled=true
external.api.auth.token=your-api-token-here

# 数据上传配置
external.upload.enabled=true
external.upload.batch-size=500
external.upload.retry-count=3
external.upload.timeout=60000

# ================================
# 系统配置
# ================================
# 系统监控配置
system.monitor.enabled=true
system.monitor.interval=60000
system.monitor.memory-threshold=80
system.monitor.cpu-threshold=80

# 报警配置
system.alarm.enabled=true
system.alarm.sound.enabled=true
system.alarm.sound.file=sounds/alarm.wav
system.alarm.delay=0
system.alarm.interval=10

# 备份配置
system.backup.enabled=true
system.backup.interval=86400000
system.backup.retention-days=30
system.backup.path=backup/

# ================================
# JavaFX 界面配置
# ================================
# 界面主题配置
ui.theme=light
ui.language=zh_CN
ui.font.family=Microsoft YaHei
ui.font.size=14

# 窗口配置
ui.window.width=1280
ui.window.height=800
ui.window.resizable=true
ui.window.maximized=false

# 表格配置
ui.table.page-size=20
ui.table.auto-refresh.enabled=true
ui.table.auto-refresh.interval=30000

# ================================
# 开发配置
# ================================
# 开发模式配置（生产环境请设置为false）
app.debug.enabled=true
app.debug.show-sql=true
app.debug.mock-devices=false

# 测试数据配置
app.test-data.enabled=false
app.test-data.auto-generate=false

# ================================
# 安全配置
# ================================
# 数据加密配置
security.encryption.enabled=true
security.encryption.algorithm=AES
security.encryption.key=your-encryption-key-here

# 操作日志配置
security.audit.enabled=true
security.audit.log-file=logs/audit.log

# 系统锁定配置
security.lock.enabled=false
security.lock.timeout=1800000
security.lock.password=admin123 