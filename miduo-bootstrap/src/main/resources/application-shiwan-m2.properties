# 石湾 2 号机后端：使用 shiwan-m2-settings.json 中的数据库连接
# 启动时加上 profile: --spring.profiles.active=shiwan-m2
# 并确保运行目录下存在 shiwan-m2-settings.json（与前端系统设置保存的路径一致）
shiwan.m2.datasource.enabled=true


# 若不启用上面配置，可仍使用默认 spring.datasource.* 配置

# IO 设备配置文件（石湾2号机独立）
io.device.ini=io_devices_shiwan_m2.ini

# 1 号机 T_Code 同步（开始采集后由前端 /api/shiwan-m2/m1-sync/start 激活，停止采集后关闭）
shiwan.m2.m1-sync.enabled=true

# 盒码/箱码 TCP 采集服务（连接两台相机，FIFO 匹配后写 CodeRelationUpload）
shiwan.m2.tcp-capture.enabled=true

# 启用 Spring @Scheduled 支持
spring.task.scheduling.enabled=true

# Bean 懒加载：仅在首次请求时初始化，减少 Spring 上下文启动耗时
spring.main.lazy-initialization=true

# 码包本地导入：MySQL 下大批量（≥5000 条去重后）用临时表 JOIN 查重，减少往返
code.package.import.mysql-temp-table-dup-check=true
