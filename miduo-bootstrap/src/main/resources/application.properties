# ========== 应用配置 ==========
spring.application.name=miduo-basebackend
server.port=8080

# ========== 数据源配置 ==========
# 使用 JTDS 驱动连接 SQL Server（解决TLS版本兼容问题）
spring.datasource.url=jdbc:jtds:sqlserver://192.168.5.22:1433/cshTest_db
spring.datasource.username=test2016
spring.datasource.password=test2016
spring.datasource.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# HikariCP 连接池配置（解决 JTDS 兼容性问题）
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-timeout=60000

# ========== MyBatis-Plus 配置 ==========
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.miduo.cloud.entity.po,com.miduo.cloud.infrastructure.persistence.mybatis.po
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=isDel
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=false

# 配置 JDBC 类型映射（解决 JTDS 驱动不支持 LocalDateTime 的问题）
mybatis-plus.configuration.jdbc-type-for-null=NULL
mybatis-plus.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler

